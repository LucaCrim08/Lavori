<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Anagrafica 6.0</title>
    <style>
        body { font-family: sans-serif; background: #eee; margin: 30px; }
        input[type="text"], input[type="date"], select { width: 280px; padding: 5px; margin-bottom: 12px; }
        button { background: #336699; color: white; border: 0; padding: 10px 40px; cursor: pointer; }
        .error { color: red; font-size: 12px; display: block; margin-top: -10px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <h2>Anagrafica Utente</h2>

    Nome: <input type="text" id="nome"><br>
    Cognome: <input type="text" id="cognome"><br>
    Email: <input type="text" id="email"><br>
    Codice Fiscale: <input type="text" id="codFis"><br>
    CAP: <input type="text" id="cap"><br>
    Data di nascita: <input type="date" id="dataNascita"><br>

    Sesso:<br>
    <input type="radio" name="sesso" value="Maschio"> M 
    <input type="radio" name="sesso" value="Femmina"> F 
    <input type="radio" name="sesso" value="Altro"> Altro <br><br>

    Mezzi: 
    <input type="checkbox" class="mezzo" value="Auto"> Auto
    <input type="checkbox" class="mezzo" value="Moto"> Moto
    <input type="checkbox" class="mezzo" value="Bici"> Bici
    <input type="checkbox" class="mezzo" value="Cavallo"> Cavallo
    <input type="checkbox" class="mezzo" value="monopattino"> Monopattino <br><br>

    Provincia: 
    <select id="provincia">
        <option value="MI">Milano</option>
        <option value="VA">Varese</option>
        <option value="NA">Napoli</option>
        <option value="RM">Roma</option>
        <option value="GE">Genova</option>
    </select><br><br>

    <button onclick="mostraRisultato()">Invia</button>
    <a href="stampaAnagrafica.html" style="display:block; margin-top:20px;">Stampa</a>

<script>
    
    const pattLettere = /^[A-Za-zÀ-ÿ\s]+$/;
    const pattCap = /^\d{5}$/;
    const pattEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    const pattCodFis = /^[A-Z]{6}\d{2}[A-Z]\d{2}[A-Z]\d{3}[A-Z]$/i;

    let ele = JSON.parse(localStorage.getItem("elenco")) || [];

function getGenerazione(anno) {
        if (anno >= 2013) return "Generazione Alpha";
        else if (anno >= 1997) return "Generazione Z";
        else if (anno >= 1981) return "Millennials";
        else if (anno >= 1965) return "Generazione X";
        else if (anno >= 1946) return "Baby Boomers";
        else if (anno >= 1928) return "Generazione Silenziosa";
        else if (anno >= 1901) return "Greatest Generation";
        else return "Generazione non definita";
    }

    function mostraRisultato() {
        
        const nome = document.getElementById("nome").value;
        const cognome = document.getElementById("cognome").value;
        const email = document.getElementById("email").value;
        const cap = document.getElementById("cap").value;
        const codFis = document.getElementById("codFis").value;
        const dataNascita = document.getElementById("dataNascita").value;

        if (!pattLettere.test(nome)) return alert("Nome non valido (solo lettere)!");
        if (!pattLettere.test(cognome)) return alert("Cognome non valido (solo lettere)!");
        if (!pattEmail.test(email)) return alert("Email non valida!");
        if (!pattCodFis.test(codFis)) return alert("Codice Fiscale non valido!");
        if (!pattCap.test(cap)) return alert("CAP deve essere di 5 numeri!");
        if (!dataNascita) return alert("Inserire la data di nascita!");

        const persona = {
            nome,
            cognome,
            email,
            cap,
            codFis,
            dataNascita,
            sesso: document.querySelector('input[name="sesso"]:checked')?.value || "N/D",
            mezzi: Array.from(document.querySelectorAll('.mezzo:checked'));
            provincia: document.getElementById("provincia").value,
            eta: new Date().getFullYear() - new Date(dataNascita).getFullYear(),
            generazione: getGenerazione(new Date(dataNascita).getFullYear())
        };

        ele.push(persona);
        localStorage.setItem("elenco", JSON.stringify(ele));
    }
</script>

</body>
</html>
